<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Background transparent -->
  <rect width="16" height="16" fill="transparent"/>
  
  <!-- Face/Skin -->
  <rect x="4" y="3" width="8" height="7" fill="#e0c0a0"/>
  <rect x="5" y="10" width="6" height="1" fill="#c0a080"/> <!-- neck shadow -->

  <!-- Hair (Dark grey/black) -->
  <rect x="3" y="2" width="10" height="2" fill="#111"/>
  <rect x="3" y="4" width="1" height="3" fill="#111"/>
  <rect x="12" y="4" width="1" height="3" fill="#111"/>
  <rect x="4" y="2" width="2" height="1" fill="#111"/>
  <rect x="10" y="2" width="2" height="1" fill="#111"/>

  <!-- Eyes (Dark grey/black) -->
  <rect x="5" y="6" width="2" height="1" fill="#111"/>
  <rect x="9" y="6" width="2" height="1" fill="#111"/>

  <!-- Glasses (Highlight color: #2b7fff) -->
  <rect x="4" y="5" width="3" height="3" fill="none" stroke="#2b7fff" stroke-width="1"/>
  <rect x="9" y="5" width="3" height="3" fill="none" stroke="#2b7fff" stroke-width="1"/>
  <rect x="7" y="6" width="2" height="1" fill="#2b7fff"/> <!-- bridge -->

  <!-- Mouth -->
  <rect x="7" y="8" width="2" height="1" fill="#111"/>

  <!-- Shirt/Body (Darker grey with accent stripes) -->
  <rect x="3" y="11" width="10" height="5" fill="#222"/>
  <rect x="5" y="11" width="6" height="2" fill="#333"/>
  <rect x="7" y="13" width="2" height="3" fill="#2b7fff"/> <!-- accent tie/stripe -->

</svg>
